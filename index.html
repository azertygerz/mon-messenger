<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger - Connexion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="logo">
                <i class="fas fa-comments"></i>
                <h1>Messenger</h1>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>Nom d'utilisateur</label>
                    <input type="text" id="username" required placeholder="Entrez votre pseudo">
                </div>
                <button type="submit" class="btn-primary">Démarrer la conversation</button>
            </form>
            
            <div class="info">
                <p>💡 Testez avec plusieurs onglets/navigateurs</p>
                <p>📱 Compatible mobile et desktop</p>
            </div>
        </div>
    </div>
    
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
