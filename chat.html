<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger - Chat</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://js.pusher.com/7.2/pusher.min.js"></script>
</head>
<body>
    <div class="chat-container">
        <!-- Sidebar des utilisateurs -->
        <div class="users-sidebar" id="usersSidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-users"></i> Contacts</h3>
                <div class="current-user">
                    <span id="currentUserName"></span>
                    <button id="logoutBtn" class="btn-icon">🚪</button>
                </div>
            </div>
            <div class="users-list" id="usersList">
                <!-- Les utilisateurs seront chargés ici -->
            </div>
        </div>
        
        <!-- Zone de chat principale -->
        <div class="chat-main">
            <div class="chat-header" id="chatHeader">
                <div>
                    <i class="fas fa-user-circle"></i>
                    <span id="chatWithUser">Sélectionnez un contact</span>
                </div>
                <div id="typingStatus" class="typing-status"></div>
            </div>
            
            <div class="messages-area" id="messagesArea">
                <div class="welcome-message">
                    <i class="fas fa-comment-dots"></i>
                    <p>Sélectionnez un utilisateur pour commencer à discuter</p>
                </div>
            </div>
            
            <div class="chat-input-area" id="chatInputArea" style="display: none;">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Votre message..." autocomplete="off">
                    <button id="sendBtn" class="btn-send">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
